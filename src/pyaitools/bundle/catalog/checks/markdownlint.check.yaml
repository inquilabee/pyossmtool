id: markdownlint.check
tool: markdownlint
name: Markdownlint
description: Lint Markdown files for style issues.
include:
  - "**/*.{md,markdown}"
argv:
  - -c
  - "{config}"
  - -j
  - "{target}"
parser: markdownlint_json
success:
  exit_codes: [0, 1]
remediation:
  suggested_commands:
    - markdownlint {target}

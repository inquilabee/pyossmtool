id: yamlfmt
name: yamlfmt
description: YAML formatter and linter from Google.
install:
  method: system
  package: yamlfmt
binary: yamlfmt
documentation_url: https://github.com/google/yamlfmt
config:
  flag: -conf
  bundled: yamlfmt.yaml
  repo_files:
    - .yamlfmt.yaml
    - .yamlfmt.yml
    - yamlfmt.yaml
ignore:
  kind: config_overlay
  format: yaml
  file: yamlfmt.yaml
  flag: -conf
  key: exclude
  key_style: list
files:
  - '**/*.{yml,yaml}'

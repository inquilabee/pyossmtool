<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}shipgate{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css"
              rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#0f766e", soft: "#ccfbf1", dark: "#115e59" },
            ink: "#1c1917",
            muted: "#57534e",
            line: "#d6d3d1",
            surface: "#ffffff",
            canvas: "#f7f5f1",
          },
          fontFamily: {
            sans: ['"IBM Plex Sans"', "Segoe UI", "system-ui", "sans-serif"],
            mono: ["ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
          },
        },
      },
    };
        </script>
        {% block extra_head %}{% endblock %}
        <link rel="stylesheet" href="/static/css/app.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
              rel="stylesheet">
        <script src="https://unpkg.com/htmx.org@2"></script>
        <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"
                defer></script>
        <script src="/static/js/app.js" defer></script>
    </head>
    <body class="flex min-h-screen flex-col bg-canvas font-sans text-ink antialiased">
        <header class="sticky top-0 z-20 border-b border-line bg-white/90 backdrop-blur">
            <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-3 sm:px-6">
                <a class="text-lg font-bold tracking-tight text-ink no-underline hover:text-brand"
                   href="/">shipgate</a>
                <nav class="flex flex-wrap gap-4 text-sm font-medium text-muted">
                    <a href="/"
                       class="hover:text-ink {% if request.url.path == '/' %}text-ink{% endif %}">Overview</a>
                    <a href="/runs"
                       class="hover:text-ink {% if request.url.path == '/runs' %}text-ink{% endif %}">Runs</a>
                    <a href="/runs/new"
                       class="hover:text-ink {% if request.url.path.startswith('/runs/new') %}text-ink{% endif %}">New run</a>
                    <a href="/tools"
                       class="hover:text-ink {% if request.url.path == '/tools' %}text-ink{% endif %}">Tool docs</a>
                </nav>
            </div>
        </header>
        <main class="mx-auto w-full max-w-6xl flex-1 px-4 py-6 sm:px-6">
            {% block content %}{% endblock %}
        </main>
        <footer class="border-t border-line bg-white/90">
            <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-4 text-sm text-muted sm:px-6">
                <span>shipgate {{ shipgate_version }}</span>
                <a class="font-medium text-brand hover:underline"
                   href="{{ github_repo_url }}"
                   target="_blank"
                   rel="noopener noreferrer">GitHub</a>
            </div>
        </footer>
    </body>
</html>

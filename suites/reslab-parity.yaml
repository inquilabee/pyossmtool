id: reslab-parity
name: ResLab Parity Reference
description: Alias for the standard suite — full reslab-equivalent CLI tool coverage.
env: auto
ignore-profile:
  - .gitignore
  - .cursorignore
ignore-paths:
  - .pyaitools/
  - venv/
  - .venv/
  - reports/
  - sample_files/
targets:
  python: src/
  tests: tests/
  coverage: src/
  shell: bin/
  markdown: .
  yaml: .
  prose: .
  repo: .
  dockerfile: Dockerfile
checks:
  # Format first, then lint
  - id: ruff.format
  - id: ruff.lint
  - id: ruff.unused
  - id: ty.check
  - id: shfmt.format
  - id: shellcheck
  - id: bandit.scan
  - id: gitleaks.secrets
  - id: semgrep.scan
  - id: deadcode.scan
  - id: vulture.scan
  - id: pydeps.cycles
  - id: radon.cc
  - id: radon.mi
  - id: jscpd.duplication
  - id: mdformat.format
  - id: markdownlint.check
  - id: yamlfmt.format
  - id: yamllint.check
  - id: codespell.spelling
  - id: pytest.test
  - id: pytest.coverage
  - id: hadolint.dockerfile

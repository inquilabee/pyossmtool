id: gitleaks.secrets
tool: gitleaks
name: Gitleaks Secret Scan
description: Scan repository for leaked secrets.
argv:
  - detect
  - --source
  - "{target}"
  - --no-banner
  - --redact
  - --report-format
  - json
  - --report-path
  - .pyaitools/gitleaks-report.json
parser: gitleaks_json
success:
  exit_codes: [0]
output_file: .pyaitools/gitleaks-report.json
remediation:
  suggested_commands:
    - "gitleaks detect --source {target}"

id: pydeps.cycles
tool: pydeps
name: Pydeps Import Cycles
description: Fail when Python import cycles are detected.
target_key: python
argv:
  - "{target}"
  - --show-cycles
  - --no-show
parser: pydeps_cycles_text
success:
  exit_codes: [0, 1, 2]
remediation:
  suggested_commands:
    - "pydeps {target} --show-cycles --no-show"

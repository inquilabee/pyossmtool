id: bandit
name: Bandit
description: Security issue scanner for Python.
install:
  method: pip
  package: "bandit>=1.9.0"
binary: bandit
documentation_url: https://bandit.readthedocs.io/
config:
  flag: -c
  bundled: bandit.yaml
  pyproject: [tool, bandit]
  use_pyproject_as_path: true
ignore:
  kind: flag_pairs
  flag: -x
